      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      background-image:

        radial-gradient(1.5px 1.5px at 55% 10%, #fff 0%, transparent 100%),

        radial-gradient(1.5px 1.5px at 20% 80%, #cce 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 92%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 93% 60%, #adf 0%, transparent 100%),
        radial-gradient(1px 1px at 62% 42%, #fff 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 5%  5%,  #cce 0%, transparent 100%);
      background-size: 600px 600px;
      animation: drift 60s linear infinite;
    }
    body::after {
      background-image:
        radial-gradient(1px 1px at 15% 65%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 30%, #adf 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 75% 85%, #fff 0%, transparent 100%),

      background-size: 800px 800px;
      animation: drift 90s linear infinite;
      opacity: 0.6;
    }

</head>

let score = 0;

function startQuiz(count) {
  const shuffled = [...questions].sort(() => Math.random() - 0.5);
  deck = shuffled.slice(0, Math.min(count, shuffled.length));
  current = 0;
  score = 0;
  show("quiz-screen");
  loadQuestion();
}

function loadQuestion() {
  const q = deck[current];
  const total = deck.length;

  document.getElementById("progress-fill").style.width = `${(current / total) * 100}%`;
  document.getElementById("question-number").textContent = `Question ${current + 1} of ${total}`;
  document.getElementById("question-text").textContent = q.question;
  document.getElementById("feedback").textContent = "";
  document.getElementById("next-btn").style.display = "none";

  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";
  q.choices.forEach((text, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = text;
    btn.onclick = () => selectAnswer(i, btn);
    choicesEl.appendChild(btn);
  });
}

function selectAnswer(index, btn) {
  const q = deck[current];
  const buttons = document.querySelectorAll(".choice-btn");

  buttons.forEach(b => b.disabled = true);

  if (index === q.answer) {
    btn.classList.add("correct");
    document.getElementById("feedback").textContent = "Correct!";
    score++;
  } else {
    btn.classList.add("wrong");
    buttons[q.answer].classList.add("correct");
    document.getElementById("feedback").textContent = "Not quite — the correct answer is highlighted.";
  }

  document.getElementById("next-btn").style.display = "block";
}

function nextQuestion() {
  current++;
  if (current < deck.length) {
    loadQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  document.getElementById("progress-fill").style.width = "100%";
  const total = deck.length;
  document.getElementById("score-display").textContent = `${score} / ${total}`;

  const pct = score / total;
  const msg =
    pct === 1   ? "Perfect score! Outstanding." :
    pct >= 0.8  ? "Great job! Almost there." :
    pct >= 0.6  ? "Decent start. Keep studying." :
                  "Keep at it — review the material and try again.";
  document.getElementById("results-message").textContent = msg;

  show("results-screen");
}

function show(id) {
  ["start-screen", "quiz-screen", "results-screen"].forEach(s => {
    document.getElementById(s).classList.toggle("hidden", s !== id);
  });
}
</script>
